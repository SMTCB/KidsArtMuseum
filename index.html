<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FMB / ART — Museu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Caveat:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="gallery.css">
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="art-data.js"></script>
<script type="text/babel" src="art-animations.jsx"></script>
<script type="text/babel" src="gallery-core.jsx"></script>

<script type="text/babel">
const THEMES = [
  { id: "whitecube", label: "Cubo Branco" },
  { id: "wall",      label: "Parede de Galeria" }
];

function App() {
  const [theme, setTheme] = React.useState(() => {
    const stored = localStorage.getItem("fmb-theme");
    return (stored === "whitecube" || stored === "wall") ? stored : "wall";
  });

  React.useEffect(() => {
    localStorage.setItem("fmb-theme", theme);
  }, [theme]);

  return (
    <div className="app" data-screen-label="Museum Hall">
      <nav className="app-bar" aria-label="Estilo da galeria">
        <span className="app-bar-brand">FMB &middot; ART</span>
        {THEMES.map(t => (
          <button
            key={t.id}
            className={"app-bar-tab " + (theme === t.id ? "is-active" : "")}
            onClick={() => setTheme(t.id)}
          >{t.label}</button>
        ))}
      </nav>

      <Hallway theme={theme} key={theme} />

      <div className="app-hint">
        {theme === "wall"
          ? "Clica numa obra para a ver de perto"
          : "Scroll horizontal · Clica numa obra para a ver de perto"}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
